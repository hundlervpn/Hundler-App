name: hundler
description: "Hundler VPN — VLESS+Reality VPN client for Windows."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.5.0
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter

  # State management — те же пакеты что в Android-клиенте.
  flutter_riverpod: ^2.6.1

  # Networking
  dio: ^5.7.0

  # SHA-256 проверка целостности sing-box.exe / wintun.dll перед
  # запуском (lib/services/binary_integrity.dart).
  crypto: ^3.0.6

  # SVG-флаги стран — на Windows Segoe UI Emoji НЕ рендерит regional-
  # indicator-pairs как флаги, поэтому используем SVG-набор. ~30 KB
  # на все флаги мира, lazy-load по ISO-2 коду.
  country_flags: ^3.2.0

  # Storage — собственная DPAPI-обёртка через win32 FFI
  # (lib/services/secure_storage.dart).
  # `flutter_secure_storage_windows` НЕ используем т.к. его C++ часть
  # требует atlstr.h (ATL/MFC компонент VS Build Tools), которого нет
  # в дефолтной установке Flutter Desktop tooling.
  win32: ^5.5.0
  ffi: ^2.1.0
  # sing-box JSON кэшируем в plain-файле в %APPDATA% (NTFS-permissions
  # достаточно — другие user-аккаунты не прочитают эту папку).
  path_provider: ^2.1.4

  # Device info → X-HWID header. На Windows .deviceId = MachineGuid из
  # HKLM\SOFTWARE\Microsoft\Cryptography\MachineGuid — стабильный
  # per-machine UUID, переживает reinstall если C:\ остался.
  device_info_plus: ^11.2.0
  package_info_plus: ^8.1.1

  # UI
  google_fonts: ^6.2.1
  lucide_icons_flutter: ^3.0.5
  flutter_animate: ^4.5.0

  # Windows desktop-only:
  # frameless окно, set min size, hide-to-tray поведение.
  window_manager: ^0.4.2
  # system tray icon + контекст-меню "Подключено к 🇩🇪 / Quit".
  tray_manager: ^0.2.4
  # Открыть default-браузер для OAuth (Google / Telegram). OAuth-flow
  # построен на loopback HTTP server (см. lib/services/auth_service.dart):
  # юзер логинится в браузере, бэкенд редиректит на http://127.0.0.1:<port>/
  # auth/callback?token=..., наш HttpServer ловит запрос и достаёт токен.
  # Это RFC 8252 для OAuth Desktop Apps — работает без custom URL scheme,
  # без single-instance lock, без UAC.
  url_launcher: ^6.3.1

  # cupertino_icons остаётся — Material+Cupertino не помешают,
  # реальные иконки везде через lucide.
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # Генератор иконок для Windows-exe (taskbar / window title / .exe-shell).
  # Использует assets/images/tiger-source.png (600×600) как единственный
  # source-of-truth для бренда. После любого изменения тигра запустить:
  #   dart run flutter_launcher_icons
  # Это перегенерирует windows/runner/resources/app_icon.ico с резолюциями
  # 16/24/32/48/64/128/256 и положит обратно в репо. .ico коммитим —
  # CI на Windows-runner'e не запускает flutter_launcher_icons.
  flutter_launcher_icons: ^0.14.1


flutter:
  uses-material-design: true
  assets:
    - assets/images/

  # Manrope + Space Grotesk грузятся через google_fonts на лету
  # (HTTP-кеш + offline после первого запуска). Если позже потребуется
  # bundling — положить .ttf в assets/fonts/ и заполнить fonts: блок.

# Конфиг flutter_launcher_icons: генерим ТОЛЬКО Windows-иконку.
# Android/iOS — отдельные клиенты в hundlerandroid/ / hundlerios/, у них
# свои иконки и свои pubspec. Здесь только Windows-target.
#
# image_path указывает на 600×600 PNG с альфа-каналом (морда тигра на
# прозрачном фоне). Пакет внутри ресайзит в 8 канонических размеров и
# собирает мульти-фрейм .ico.
flutter_launcher_icons:
  windows:
    generate: true
    image_path: "assets/images/tiger-source.png"
    icon_size: 256
